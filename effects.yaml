# ==============================================================================
#  effects.yaml — Light effects package
#
#  The effect list below is the SINGLE source of truth. The firmware reads the
#  registered effects directly from the light component at runtime
#  (id(led_rings).get_effects()) — there is no separate name list to keep in
#  sync anymore. Cycling order (button double-click) = order in this file.
#
#  TUNING: every magic number lives in the substitutions block below.
#  Edit a value, reflash, done. Colours are raw pixel values BEFORE the
#  light's color_correct is applied.
#
#  RUNTIME SPEED: animated effects read id(effect_speed) (1–100, default 50 =
#  the substitution defaults below). Solids and Night Light ignore it.
# ==============================================================================

substitutions:
  # --- Twinkle ("starfield") — baby-lamp defaults: sparse, slow, soft ---
  # With 24 LEDs @ 140 ms: ~1 new spark per second across the whole cloud,
  # each fading over ~9 s. Raise chance / lower fade_step for even calmer.
  twinkle_ignite_chance: "160"  # 1-in-N chance per pixel per frame (higher = calmer)
  twinkle_fade_step:     "4"    # Fade-out per frame (lower = longer, softer trails)
  twinkle_interval:      "140ms"
  twinkle_peak:          "170"  # Soft max spark brightness (was hard 255 — too sharp)

  # --- Pulse ("breathing") — pixel-level so it never overwrites brightness_pct ---
  pulse_min_level: "51"         # ~20% of 255
  pulse_max_level: "217"        # ~85% of 255
  pulse_period_ms: "8000"       # Full there-and-back cycle at speed 50

  # --- Rainbow ---
  rainbow_width: "24"           # One full spectrum across all 3 rings
  rainbow_period_ms: "12000"    # Full hue lap at speed 50

  # --- Color Wipe (soft sky colours) ---
  wipe_led_interval_ms: "400"   # Per-LED step at speed 50; 24 LEDs ≈ 9.6 s per colour

  # --- Sky Breathing (slow crossfade between two sky tones) ---
  sky_breath_period_s: "14"     # Seconds for a full there-and-back crossfade at speed 50

  # --- Aurora Drift (moving pastel gradient, per-ring depth) ---
  aurora_period_s: "22"         # Seconds for one full drift cycle at speed 50

  # --- Candlelight ---
  candle_interval_ms: "90"      # Flicker update rate at speed 50
  candle_depth:       "28"      # Max flicker dip (0-255); higher = more nervous flame

  # --- Night Light ---
  night_light_level: "26"       # Pixel value ceiling (0-255); very dim warm glow

light:
  - id: !extend led_rings
    effects:
      # ------------------------------------------------------------
      # Solid colours (slow refresh; brightness/colour-correction is
      # applied by the light component at output time, so no fast
      # redraw is needed).
      # Order is the UI / button cycle order: neutrals first (White is
      # the default cycle start), then the spectrum red → violet.
      # ------------------------------------------------------------
      - addressable_lambda:
          name: "White"
          update_interval: 250ms
          lambda: 'it.all() = Color(255, 255, 255);'
      - addressable_lambda:
          name: "Warm White"
          update_interval: 250ms
          lambda: 'it.all() = Color(255, 180, 107);'
      # Case PLA colour — Bambu Lab Matte "Latte Brown" (#D3B7A7)
      - addressable_lambda:
          name: "Latte Brown"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xD3, 0xB7, 0xA7);'
      - addressable_lambda:
          name: "Red"
          update_interval: 250ms
          lambda: 'it.all() = Color(255, 0, 0);'
      # Slightly warm yellow — pure (255,255,0) reads greenish on WS2812.
      - addressable_lambda:
          name: "Yellow"
          update_interval: 250ms
          lambda: 'it.all() = Color(255, 200, 0);'
      - addressable_lambda:
          name: "Green"
          update_interval: 250ms
          lambda: 'it.all() = Color(0, 255, 0);'
      - addressable_lambda:
          name: "Cyan"
          update_interval: 250ms
          lambda: 'it.all() = Color(0, 255, 255);'
      - addressable_lambda:
          name: "Sky Blue"
          update_interval: 250ms
          lambda: 'it.all() = Color(90, 170, 255);'
      - addressable_lambda:
          name: "Blue"
          update_interval: 250ms
          lambda: 'it.all() = Color(0, 0, 255);'
      - addressable_lambda:
          name: "Violet"
          update_interval: 250ms
          lambda: 'it.all() = Color(138, 43, 226);'

      # ------------------------------------------------------------
      # Calm animated effects (the "cloud character" set)
      # Speed: id(effect_speed) 1–100; 50 = substitution defaults.
      # ------------------------------------------------------------

      # Sky Breathing: very slow sinusoidal crossfade between a daylight blue
      # and a soft cyan. The signature calm-cloud effect.
      - addressable_lambda:
          name: "Sky Breathing"
          update_interval: 50ms
          lambda: |-
            const Color a(70, 150, 255);   // daylight blue
            const Color b(10, 210, 235);   // soft cyan
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${sky_breath_period_s} * 1000.0f * 50.0f / spd);
            if (period < 800) period = 800;
            float t = (millis() % period) / (float) period;
            float m = 0.5f - 0.5f * cosf(t * 2.0f * (float) M_PI);  // 0..1..0
            it.all() = Color(
              (uint8_t)(a.r + (b.r - a.r) * m),
              (uint8_t)(a.g + (b.g - a.g) * m),
              (uint8_t)(a.b + (b.b - a.b) * m));

      # Aurora Drift: a slow-moving gradient (cyan → violet). Each pixel
      # gets a phase offset, so the three rings show slightly different hues —
      # the cloud appears to have depth.
      - addressable_lambda:
          name: "Aurora Drift"
          update_interval: 60ms
          lambda: |-
            // Saturated endpoints so the two hues are clearly distinguishable
            // (the previous pastel pair washed out into near-uniform blue).
            const Color a(0, 230, 210);     // vivid teal-cyan
            const Color b(170, 30, 255);    // vivid violet
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${aurora_period_s} * 1000.0f * 50.0f / spd);
            if (period < 800) period = 800;
            float t = (millis() % period) / (float) period;
            for (int i = 0; i < it.size(); i++) {
              float phase = t * 2.0f * (float) M_PI + (i * 2.0f * (float) M_PI / it.size());
              float m = 0.5f + 0.5f * sinf(phase);
              it[i] = Color(
                (uint8_t)(a.r + (b.r - a.r) * m),
                (uint8_t)(a.g + (b.g - a.g) * m),
                (uint8_t)(a.b + (b.b - a.b) * m));
            }

      # Candlelight: warm white with a gentle random-walk flicker per ring
      # (8 LEDs each), like a flame behind frosted glass.
      - addressable_lambda:
          name: "Candlelight"
          update_interval: 40ms
          lambda: |-
            static uint8_t dip[3] = {0, 0, 0};
            static uint32_t last_step = 0;
            const Color base(255, 147, 41);   // classic candle colour
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t interval = (uint32_t)(${candle_interval_ms} * 50.0f / spd);
            if (interval < 20) interval = 20;
            uint32_t now = millis();
            if (last_step == 0 || now - last_step >= interval) {
              last_step = now;
              for (int r = 0; r < 3; r++) {
                uint8_t target = random_uint32() % ${candle_depth};
                dip[r] = (dip[r] * 3 + target) / 4;
              }
            }
            for (int r = 0; r < 3; r++) {
              uint8_t scale = 255 - dip[r];
              Color c((base.r * scale) >> 8, (base.g * scale) >> 8, (base.b * scale) >> 8);
              for (int i = r * 8; i < (r + 1) * 8 && i < it.size(); i++)
                it[i] = c;
            }

      # Night Light: fixed very dim warm glow — "leave it on all night".
      # Intentionally ignores the global brightness headroom by using low
      # pixel values, so even at 100% brightness it stays gentle.
      - addressable_lambda:
          name: "Night Light"
          update_interval: 250ms
          lambda: |-
            it.all() = Color(${night_light_level},
                             (uint8_t)(${night_light_level} * 0.55f),
                             (uint8_t)(${night_light_level} * 0.25f));

      # Twinkle: sparse soft sparks — a quiet starfield behind the cloud.
      # Defaults are deliberately slow for a baby lamp (see substitutions).
      - addressable_lambda:
          name: "Twinkle"
          update_interval: ${twinkle_interval}
          lambda: |-
            static uint8_t state[${led_count}] = {};
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t chance = (uint32_t)(${twinkle_ignite_chance} * 50.0f / spd);
            if (chance < 24) chance = 24;
            uint8_t fade = (uint8_t)(${twinkle_fade_step} * spd / 50.0f);
            if (fade < 1) fade = 1;
            for (int i = 0; i < it.size(); i++) {
              if (state[i] == 0 && (random_uint32() % chance) == 0) {
                // Soft peak with a little variation — never a hard white flash
                state[i] = ${twinkle_peak} - (random_uint32() % 40);
              } else if (state[i] > 0) {
                state[i] = state[i] > fade ? state[i] - fade : 0;
              }
              uint8_t v = state[i];
              // Very faint blue floor so the cloud never goes fully dark between stars
              it[i] = Color(v > 6 ? v : 6, v > 6 ? v : 6, v > 18 ? v : 18);
            }

      # Color Wipe: soft cloud colours, very slow sweep. Each colour fills the
      # whole strip before the next one wipes across.
      - addressable_lambda:
          name: "Color Wipe"
          update_interval: 40ms
          lambda: |-
            static int pos = 0;
            static int col = 0;
            static uint32_t last_step = 0;
            const Color colors[3] = {
              Color(0, 140, 255),     // sky blue
              Color(89, 64, 255),    // soft indigo
              Color(0, 191, 230),    // cyan
            };
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t interval = (uint32_t)(${wipe_led_interval_ms} * 50.0f / spd);
            if (interval < 30) interval = 30;
            uint32_t now = millis();
            if (last_step == 0) last_step = now;
            while (now - last_step >= interval) {
              last_step += interval;
              pos++;
              if (pos > it.size()) {
                pos = 1;
                col = (col + 1) % 3;
              }
            }
            Color cur = colors[col];
            Color prev = colors[(col + 2) % 3];
            for (int i = 0; i < it.size(); i++)
              it[i] = (i < pos) ? cur : prev;

      # Rainbow: full spectrum across the three rings, drifting slowly.
      - addressable_lambda:
          name: "Rainbow"
          update_interval: 40ms
          lambda: |-
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${rainbow_period_ms} * 50.0f / spd);
            if (period < 600) period = 600;
            float t = (millis() % period) / (float) period;
            uint8_t base_hue = (uint8_t)(t * 255.0f);
            for (int i = 0; i < it.size(); i++) {
              uint8_t hue = base_hue + (uint8_t)(i * 255 / ${rainbow_width});
              it[i] = ESPHSVColor(hue, 255, 255).to_rgb();
            }

      # Pulse: gentle breathing between two comfortable pixel levels. Never
      # fully dark and never harsh full power. Implemented as an addressable
      # effect (not the built-in brightness pulse) so it cannot overwrite the
      # user's saved brightness_pct via on_state.
      - addressable_lambda:
          name: "Pulse"
          update_interval: 50ms
          lambda: |-
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${pulse_period_ms} * 50.0f / spd);
            if (period < 800) period = 800;
            float t = (millis() % period) / (float) period;
            float m = 0.5f - 0.5f * cosf(t * 2.0f * (float) M_PI);  // 0..1..0
            uint8_t v = (uint8_t)(${pulse_min_level} + (${pulse_max_level} - ${pulse_min_level}) * m);
            it.all() = Color(v, v, v);
