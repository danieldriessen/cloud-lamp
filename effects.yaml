# ==============================================================================
#  effects.yaml — Light effects package
#
#  The effect list below is the SINGLE source of truth. The firmware reads the
#  registered effects directly from the light component at runtime
#  (id(led_rings).get_effects()) — there is no separate name list to keep in
#  sync anymore. Cycling order (button double-click) = order in this file.
#
#  TUNING: every magic number lives in the substitutions block below.
#  Edit a value, reflash, done. Colours are raw pixel values BEFORE the
#  light's color_correct is applied.
#
#  RUNTIME SPEED: animated effects read id(effect_speed) (1–100, default 50 =
#  the substitution defaults below). Solids ignore it.
# ==============================================================================

substitutions:
  # --- Twinkle ("starfield") — each spark is a smooth sin() rise-and-fall
  # envelope (never pops in/out abruptly) over a real ambient floor, so the
  # cloud always looks clearly "on" between sparks. Kid-friendly: no flashes.
  twinkle_ignite_chance:   "160"  # 1-in-N chance per idle pixel per frame (higher = calmer)
  twinkle_interval:        "140ms"
  twinkle_floor:           "42"   # Ambient glow level (0-255) — never near-black
  twinkle_peak:            "215"  # Brightness at the centre of a spark's envelope
  twinkle_duration:        "26"   # Frames for one full rise+fall envelope at speed 50
  twinkle_duration_jitter: "20"   # Extra random frames added per spark for variety

  # --- Pulse ("breathing") — pixel-level so it never overwrites brightness_pct.
  # Floor kept well above "looks off", especially once the light's own
  # brightness/colour-correct scale it down further. Raised once already
  # (this is the second pass) — still looked close to "off" at the dimmest
  # point, so the floor went up again and the cycle got a touch slower.
  pulse_min_level: "150"        # ~59% of 255 (was 115 / ~45%)
  pulse_max_level: "225"        # ~88% of 255
  pulse_period_ms: "8800"       # Full there-and-back cycle at speed 50 (was 8000)

  # --- Rainbow ---
  rainbow_width: "24"           # One full spectrum across all 3 rings
  rainbow_period_ms: "12000"    # Full hue lap at speed 50

  # --- Blue Color Wipe (blue → violet, wider than before) ---
  wipe_led_interval_ms: "350"   # Per-LED step at speed 50; 24 LEDs ≈ 8.4 s per colour (was 400)

  # --- Sky Breathing (slow crossfade between two blues) ---
  sky_breath_period_s: "14"     # Seconds for a full there-and-back crossfade at speed 50

  # --- Aurora Drift (moving pastel gradient, per-ring depth) ---
  aurora_period_s: "22"         # Seconds for one full drift cycle at speed 50

  # --- Candlelight — gentle, nursery-safe ember glow. This lamp is a
  # decorative/night light (often right next to where a baby sleeps), not a
  # room light, so the flicker is deliberately understated: a smoothly-eased
  # warm glow with small, soft dips "here and there" rather than a fast,
  # jumpy, disco-like strobe. Each ring eases continuously toward a new
  # target every candle_interval_ms instead of snapping to it, and
  # candle_depth caps how dark/red a dip can ever get (as a fraction of 255)
  # — both together are what keep it calm. Raise either for a livelier flame.
  candle_interval_ms: "320"     # New per-ring flicker target every ~this long, at speed 50
  candle_depth:        "60"     # Max dip depth (0-255, fraction of the base->ember shift)

  # --- Ring Ripple (soft wave travelling ring 1 -> ring 2 -> ring 3, see
  # "Power injection" in cloud-lamp-design.md for the physical ring-wiring
  # order) — the one motion this lamp's 3-ring build supports that no other
  # effect here uses; every other "travelling" effect moves along the
  # flattened LED strip instead. ---
  ring_ripple_travel_ms: "6000" # One ripple's full 3-ring sweep at speed 50
  ring_ripple_pause_ms:  "3000" # Calm gap between ripples at speed 50
  ring_ripple_sigma:     "0.6"  # Ripple width in ring-units; higher = softer/more cross-ring overlap

  # --- Spectrum Fade (whole lamp crossfades through the 18-colour palette) ---
  spectrum_fade_period_s: "48"  # Seconds for one full lap of the palette at speed 50 (was 36)

  # --- Spectrum Flow (same palette, travelling gradient across the LEDs) ---
  spectrum_flow_period_s: "30"  # Seconds for one full lap of the palette at speed 50

light:
  - id: !extend led_rings
    effects:
      # ------------------------------------------------------------
      # Solid colours (slow refresh; brightness/colour-correction is
      # applied by the light component at output time, so no fast
      # redraw is needed).
      # Order is the UI / button cycle order and follows the colour wheel:
      # White first (default cycle start), then one continuous hue sweep
      # blue → violet → pink → red → orange → yellow → green. Every value
      # below was picked and verified on-device with the web app's colour
      # picker before being locked in here.
      # ------------------------------------------------------------
      - addressable_lambda:
          name: "White"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xFF, 0xFF);'
      - addressable_lambda:
          name: "Sky Blue"
          update_interval: 250ms
          lambda: 'it.all() = Color(0x52, 0xD6, 0xFC);'
      - addressable_lambda:
          name: "Blue"
          update_interval: 250ms
          lambda: 'it.all() = Color(0x00, 0x56, 0xD6);'
      - addressable_lambda:
          name: "Indigo"
          update_interval: 250ms
          lambda: 'it.all() = Color(0x4D, 0x22, 0xB2);'
      - addressable_lambda:
          name: "Purple"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xBE, 0x38, 0xF3);'
      - addressable_lambda:
          name: "Magenta"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xE6, 0x3B, 0x7A);'
      - addressable_lambda:
          name: "Salmon"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xB5, 0xAF);'
      - addressable_lambda:
          name: "Red"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0x40, 0x15);'
      - addressable_lambda:
          name: "Peach"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xC5, 0xAB);'
      - addressable_lambda:
          name: "Apricot"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xD9, 0xA8);'
      - addressable_lambda:
          name: "Orange"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xC7, 0x77);'
      - addressable_lambda:
          name: "Amber"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xAB, 0x01);'
      - addressable_lambda:
          name: "Honey"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xD9, 0x77);'
      - addressable_lambda:
          name: "Gold"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFD, 0xC7, 0x00);'
      - addressable_lambda:
          name: "Vanilla"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFF, 0xFB, 0xB9);'
      - addressable_lambda:
          name: "Yellow"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xFE, 0xFB, 0x41);'
      - addressable_lambda:
          name: "Chartreuse"
          update_interval: 250ms
          lambda: 'it.all() = Color(0xD9, 0xEC, 0x37);'
      - addressable_lambda:
          name: "Green"
          update_interval: 250ms
          lambda: 'it.all() = Color(0x76, 0xBB, 0x40);'

      # ------------------------------------------------------------
      # Calm animated effects (the "cloud character" set)
      # Speed: id(effect_speed) 1–100; 50 = substitution defaults.
      # Aurora Drift is first here on purpose: it is also the effect a
      # brand-new lamp shows the first time it's switched on (see
      # last_effect_index's initial_value in cloud-lamp.yaml).
      # ------------------------------------------------------------

      # Aurora Drift: a slow-moving gradient (cyan → violet). Each pixel
      # gets a phase offset, so the three rings show slightly different hues —
      # the cloud appears to have depth.
      - addressable_lambda:
          name: "Aurora Drift"
          update_interval: 60ms
          lambda: |-
            // Saturated endpoints so the two hues are clearly distinguishable
            // (the previous pastel pair washed out into near-uniform blue).
            const Color a(0, 230, 210);     // vivid teal-cyan
            const Color b(170, 30, 255);    // vivid violet
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${aurora_period_s} * 1000.0f * 50.0f / spd);
            if (period < 800) period = 800;
            float t = (millis() % period) / (float) period;
            for (int i = 0; i < it.size(); i++) {
              float phase = t * 2.0f * (float) M_PI + (i * 2.0f * (float) M_PI / it.size());
              float m = 0.5f + 0.5f * sinf(phase);
              it[i] = Color(
                (uint8_t)(a.r + (b.r - a.r) * m),
                (uint8_t)(a.g + (b.g - a.g) * m),
                (uint8_t)(a.b + (b.b - a.b) * m));
            }

      # Sky Breathing: very slow sinusoidal crossfade between a deep ocean
      # blue and a pale, almost-white sky blue — a wide lightness/hue swing
      # so the fade reads clearly even through the diffuser.
      # The "deep ocean blue" end used to be (15, 55, 190) — at its darkest
      # point (m=0) that read as almost off in a lit room. Two compounding
      # reasons: it's a genuinely dark colour to begin with, AND the light's
      # own `color_correct: [100%, 75%, 60%]` (see cloud-lamp.yaml) knocks
      # the blue channel down to 60% on top of that — a blue-heavy colour
      # loses proportionally more perceived brightness to colour_correct
      # than a white/warm one does. This is applied on top of whatever
      # `${effect_speed}`/brightness the user has set; it isn't a "not using
      # full brightness" bug, the trough colour itself was just too dark.
      # Brightened (kept the same deep-blue hue, raised R/G more than B).
      - addressable_lambda:
          name: "Sky Breathing"
          update_interval: 50ms
          lambda: |-
            const Color a(40, 110, 225);    // deep ocean blue (brighter — was 15,55,190)
            const Color b(160, 230, 255);   // pale sky blue
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${sky_breath_period_s} * 1000.0f * 50.0f / spd);
            if (period < 800) period = 800;
            float t = (millis() % period) / (float) period;
            float m = 0.5f - 0.5f * cosf(t * 2.0f * (float) M_PI);  // 0..1..0
            it.all() = Color(
              (uint8_t)(a.r + (b.r - a.r) * m),
              (uint8_t)(a.g + (b.g - a.g) * m),
              (uint8_t)(a.b + (b.b - a.b) * m));

      # Candlelight: warm orange with a gentle, smoothly-eased flicker per
      # ring (8 LEDs each) that dims AND reddens slightly towards a
      # smouldering-ember tone — like a real, calm flame in a quiet room —
      # rather than a fast, jumpy, disco-like strobe. Deliberately subtle:
      # this lamp is a decorative night light, plausibly right next to a
      # baby's cradle, not a room light.
      - addressable_lambda:
          name: "Candlelight"
          update_interval: 40ms
          lambda: |-
            // `dip`/`target` are 0 (steady, full base colour) .. 1 (deepest,
            // most-ember dip a ring is currently allowed to reach). `dip`
            // eases continuously toward `target` every frame instead of
            // snapping straight to it — that continuous glide, not the
            // per-ring randomness itself, is what makes this read as a soft
            // flicker instead of a strobe. Each ring re-rolls its own target
            // independently and on its own schedule for a natural, never
            // perfectly-synchronised look, but the small ${candle_depth}
            // ceiling (a fraction of the full 0-255 base->ember shift) keeps
            // every dip gentle no matter what gets rolled.
            static float dip[3] = {0.0f, 0.0f, 0.0f};
            static float target[3] = {0.0f, 0.0f, 0.0f};
            static uint32_t last_step = 0;
            const Color base(255, 147, 41);   // classic candle colour
            const Color ember(150, 45, 5);    // dim, reddened low point
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t interval = (uint32_t)(${candle_interval_ms} * 50.0f / spd);
            if (interval < 80) interval = 80;
            uint32_t now = millis();
            if (last_step == 0 || now - last_step >= interval) {
              last_step = now;
              for (int r = 0; r < 3; r++)
                target[r] = (random_uint32() % 256) / 255.0f * (${candle_depth} / 255.0f);
            }
            for (int r = 0; r < 3; r++) {
              // Continuous ease, independent of update_interval's 40ms: a
              // fixed fraction of the remaining distance is closed every
              // frame, so the glow visibly glides rather than steps.
              dip[r] += (target[r] - dip[r]) * 0.05f;
              Color c(
                (uint8_t)(base.r + (ember.r - base.r) * dip[r]),
                (uint8_t)(base.g + (ember.g - base.g) * dip[r]),
                (uint8_t)(base.b + (ember.b - base.b) * dip[r]));
              for (int i = r * 8; i < (r + 1) * 8 && i < it.size(); i++)
                it[i] = c;
            }

      # Ring Ripple: a single soft brightness wave that travels physically
      # ring 1 -> ring 2 -> ring 3 (the data-wiring order — see "Power
      # injection" under Hardware in cloud-lamp-design.md), fades out past
      # the last ring, pauses briefly, then the next ripple begins — like a
      # slow ripple spreading across still water. This is a genuinely
      # different motion from every other "travelling" effect in this file
      # (Rainbow, Spectrum Flow, Blue Color Wipe all move along the
      # flattened LED strip); it's the one thing the lamp's actual 3-ring
      # construction supports that those don't use. Purely per-ring — no
      # per-LED gradient within a ring — and stateless (no static vars
      # needed; every frame is computed directly from millis()).
      - addressable_lambda:
          name: "Ring Ripple"
          update_interval: 40ms
          lambda: |-
            const Color base(55, 65, 95);     // dim, cool "resting cloud" floor
            const Color peak(230, 230, 245);  // pale near-white ripple crest
            const int rings = 3;
            const int per_ring = it.size() / rings;
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t travel = (uint32_t)(${ring_ripple_travel_ms} * 50.0f / spd);
            if (travel < 800) travel = 800;
            uint32_t pause = (uint32_t)(${ring_ripple_pause_ms} * 50.0f / spd);
            uint32_t period = travel + pause;
            uint32_t phase = millis() % period;
            // `wave` is the ripple's centre in continuous ring-space: ring r
            // sits at r+0.5. `runout` (3.5 sigma, <0.1% residual) is extra
            // travel distance *before* ring 0 and *after* the last ring so
            // the Gaussian bump below has fully decayed to ~0 at both ends
            // of `travel` — without it the ripple would pop in/out abruptly
            // right as the sweep starts/ends instead of gliding smoothly
            // down to the same floor colour the pause phase already holds.
            const float runout = 3.5f * ${ring_ripple_sigma};
            const float wave_start = 0.5f - runout;
            const float wave_end = (rings - 0.5f) + runout;
            float wave = (phase < travel)
              ? wave_start + (phase / (float) travel) * (wave_end - wave_start)
              : -1000.0f;
            for (int r = 0; r < rings; r++) {
              float d = wave - (r + 0.5f);
              float m = expf(-(d * d) / (2.0f * ${ring_ripple_sigma} * ${ring_ripple_sigma}));
              Color c(
                (uint8_t)(base.r + (peak.r - base.r) * m),
                (uint8_t)(base.g + (peak.g - base.g) * m),
                (uint8_t)(base.b + (peak.b - base.b) * m));
              for (int i = r * per_ring; i < (r + 1) * per_ring && i < it.size(); i++)
                it[i] = c;
            }

      # Spectrum Fade: the whole lamp crossfades slowly through the 18-colour
      # palette above (White → Sky Blue → ... → Green → back to White), all
      # three rings always showing the same colour.
      - addressable_lambda:
          name: "Spectrum Fade"
          update_interval: 50ms
          lambda: |-
            static const Color palette[] = {
              Color(0xFF, 0xFF, 0xFF),  // White
              Color(0x52, 0xD6, 0xFC),  // Sky Blue
              Color(0x00, 0x56, 0xD6),  // Blue
              Color(0x4D, 0x22, 0xB2),  // Indigo
              Color(0xBE, 0x38, 0xF3),  // Purple
              Color(0xE6, 0x3B, 0x7A),  // Magenta
              Color(0xFF, 0xB5, 0xAF),  // Salmon
              Color(0xFF, 0x40, 0x15),  // Red
              Color(0xFF, 0xC5, 0xAB),  // Peach
              Color(0xFF, 0xD9, 0xA8),  // Apricot
              Color(0xFF, 0xC7, 0x77),  // Orange
              Color(0xFF, 0xAB, 0x01),  // Amber
              Color(0xFF, 0xD9, 0x77),  // Honey
              Color(0xFD, 0xC7, 0x00),  // Gold
              Color(0xFF, 0xFB, 0xB9),  // Vanilla
              Color(0xFE, 0xFB, 0x41),  // Yellow
              Color(0xD9, 0xEC, 0x37),  // Chartreuse
              Color(0x76, 0xBB, 0x40),  // Green
            };
            const int n = sizeof(palette) / sizeof(palette[0]);
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${spectrum_fade_period_s} * 1000.0f * 50.0f / spd);
            if (period < 800) period = 800;
            float pos = (millis() % period) / (float) period * n;
            int idx = (int) pos;
            float frac = pos - idx;
            Color a = palette[idx % n];
            Color b = palette[(idx + 1) % n];
            it.all() = Color(
              (uint8_t)(a.r + (b.r - a.r) * frac),
              (uint8_t)(a.g + (b.g - a.g) * frac),
              (uint8_t)(a.b + (b.b - a.b) * frac));

      # Spectrum Flow: the same 18-colour palette, but travelling along the
      # strip — each LED sits a little further along the palette than its
      # neighbour, so the colours slowly scroll across the cloud instead of
      # changing all together.
      - addressable_lambda:
          name: "Spectrum Flow"
          update_interval: 50ms
          lambda: |-
            static const Color palette[] = {
              Color(0xFF, 0xFF, 0xFF),  // White
              Color(0x52, 0xD6, 0xFC),  // Sky Blue
              Color(0x00, 0x56, 0xD6),  // Blue
              Color(0x4D, 0x22, 0xB2),  // Indigo
              Color(0xBE, 0x38, 0xF3),  // Purple
              Color(0xE6, 0x3B, 0x7A),  // Magenta
              Color(0xFF, 0xB5, 0xAF),  // Salmon
              Color(0xFF, 0x40, 0x15),  // Red
              Color(0xFF, 0xC5, 0xAB),  // Peach
              Color(0xFF, 0xD9, 0xA8),  // Apricot
              Color(0xFF, 0xC7, 0x77),  // Orange
              Color(0xFF, 0xAB, 0x01),  // Amber
              Color(0xFF, 0xD9, 0x77),  // Honey
              Color(0xFD, 0xC7, 0x00),  // Gold
              Color(0xFF, 0xFB, 0xB9),  // Vanilla
              Color(0xFE, 0xFB, 0x41),  // Yellow
              Color(0xD9, 0xEC, 0x37),  // Chartreuse
              Color(0x76, 0xBB, 0x40),  // Green
            };
            const int n = sizeof(palette) / sizeof(palette[0]);
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${spectrum_flow_period_s} * 1000.0f * 50.0f / spd);
            if (period < 800) period = 800;
            float t0 = (millis() % period) / (float) period;
            for (int i = 0; i < it.size(); i++) {
              float t = t0 + (float) i / it.size();
              t -= floorf(t);
              float pos = t * n;
              int idx = (int) pos;
              float frac = pos - idx;
              Color a = palette[idx % n];
              Color b = palette[(idx + 1) % n];
              it[i] = Color(
                (uint8_t)(a.r + (b.r - a.r) * frac),
                (uint8_t)(a.g + (b.g - a.g) * frac),
                (uint8_t)(a.b + (b.b - a.b) * frac));
            }

      # Twinkle: sparse soft sparks over a real ambient glow — a quiet
      # starfield behind the cloud. Each spark is a smooth sin() rise-and-fall
      # envelope (0 → peak → 0), so nothing ever pops in or out abruptly —
      # kid-friendly, no flashes. Defaults are deliberately slow for a baby
      # lamp (see substitutions).
      - addressable_lambda:
          name: "Twinkle"
          update_interval: ${twinkle_interval}
          lambda: |-
            static uint16_t life[${led_count}] = {};        // frames left, 0 = idle
            static uint16_t life_total[${led_count}] = {};  // envelope length for life[i]
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t chance = (uint32_t)(${twinkle_ignite_chance} * 50.0f / spd);
            if (chance < 24) chance = 24;
            uint32_t duration = (uint32_t)(${twinkle_duration} * 50.0f / spd);
            if (duration < 6) duration = 6;
            for (int i = 0; i < it.size(); i++) {
              if (life[i] == 0 && (random_uint32() % chance) == 0) {
                life_total[i] = (uint16_t)(duration + (random_uint32() % ${twinkle_duration_jitter}));
                life[i] = life_total[i];
              }
              float f = life_total[i] ? (float) life[i] / (float) life_total[i] : 0.0f;
              float env = sinf((float) M_PI * f);  // 0 at both ends, smooth peak mid-life
              uint8_t v = (uint8_t)(${twinkle_floor} + (${twinkle_peak} - ${twinkle_floor}) * env);
              // Gentle cool-white tint on the sparks, never a hard flash
              uint16_t vb = (uint16_t)(v * 1.15f);
              it[i] = Color(v, v, vb > 255 ? 255 : (uint8_t) vb);
              if (life[i] > 0) life[i]--;
            }

      # Blue Color Wipe: soft blue-through-violet cloud colours, very slow
      # sweep. Each colour fills the whole strip before the next one wipes
      # across. Deliberately stays in the blue/violet family (not a full
      # rainbow — that's what Rainbow is for) but spans a wider hue range
      # than before, reusing the named Sky Blue/Blue/Indigo/Purple solids.
      # The wipe boundary used to be an integer LED index, so each step
      # snapped exactly one LED from the old colour straight to the new one
      # — clearly visible as individual LEDs "popping" on. Rainbow doesn't
      # show this because its hue is a continuous per-pixel gradient with no
      # hard edge anywhere. Fixed the same way: `pos` is now a float that
      # advances continuously (real elapsed time × speed, not a per-LED
      # tick), and the one LED the moving edge is currently crossing is
      # blended smoothly between the old and new colour instead of flipping
      # outright — same wipe, same speed character, but the edge itself now
      # glides rather than steps. Also nudged a little faster per your
      # feedback (see wipe_led_interval_ms).
      - addressable_lambda:
          name: "Blue Color Wipe"
          update_interval: 40ms
          lambda: |-
            static float pos = 0.0f;
            static int col = 0;
            static uint32_t last_frame = 0;
            const Color colors[4] = {
              Color(0x52, 0xD6, 0xFC),  // Sky Blue
              Color(0x00, 0x56, 0xD6),  // Blue
              Color(0x4D, 0x22, 0xB2),  // Indigo
              Color(0xBE, 0x38, 0xF3),  // Purple
            };
            const int n = 4;
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t interval = (uint32_t)(${wipe_led_interval_ms} * 50.0f / spd);
            if (interval < 30) interval = 30;
            uint32_t now = millis();
            if (last_frame == 0) last_frame = now;
            // Fractional LEDs advanced since the last frame (real elapsed
            // time, not a fixed per-tick step) — this is what lets the edge
            // glide continuously instead of jumping a whole LED at once.
            pos += (now - last_frame) / (float) interval;
            last_frame = now;
            while (pos >= it.size()) {
              pos -= it.size();
              col = (col + 1) % n;
            }
            Color cur = colors[col];
            Color prev = colors[(col + n - 1) % n];
            for (int i = 0; i < it.size(); i++) {
              // 0 (still "prev") .. 1 (fully "cur"); only the single LED the
              // edge is currently crossing sits strictly between the two.
              float m = pos - i;
              if (m < 0.0f) m = 0.0f;
              if (m > 1.0f) m = 1.0f;
              it[i] = Color(
                (uint8_t)(prev.r + (cur.r - prev.r) * m),
                (uint8_t)(prev.g + (cur.g - prev.g) * m),
                (uint8_t)(prev.b + (cur.b - prev.b) * m));
            }

      # Rainbow: full spectrum across the three rings, drifting slowly.
      - addressable_lambda:
          name: "Rainbow"
          update_interval: 40ms
          lambda: |-
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${rainbow_period_ms} * 50.0f / spd);
            if (period < 600) period = 600;
            float t = (millis() % period) / (float) period;
            uint8_t base_hue = (uint8_t)(t * 255.0f);
            for (int i = 0; i < it.size(); i++) {
              uint8_t hue = base_hue + (uint8_t)(i * 255 / ${rainbow_width});
              it[i] = ESPHSVColor(hue, 255, 255).to_rgb();
            }

      # Pulse: gentle breathing between two comfortable pixel levels. Never
      # fully dark and never harsh full power. Implemented as an addressable
      # effect (not the built-in brightness pulse) so it cannot overwrite the
      # user's saved brightness_pct via on_state. Floor raised and cycle
      # slowed slightly (again) — see pulse_min_level/pulse_period_ms above.
      - addressable_lambda:
          name: "Pulse"
          update_interval: 50ms
          lambda: |-
            float spd = id(effect_speed).state;
            if (std::isnan(spd) || spd < 1.0f) spd = 50.0f;
            if (spd > 100.0f) spd = 100.0f;
            uint32_t period = (uint32_t)(${pulse_period_ms} * 50.0f / spd);
            if (period < 800) period = 800;
            float t = (millis() % period) / (float) period;
            float m = 0.5f - 0.5f * cosf(t * 2.0f * (float) M_PI);  // 0..1..0
            uint8_t v = (uint8_t)(${pulse_min_level} + (${pulse_max_level} - ${pulse_min_level}) * m);
            it.all() = Color(v, v, v);
