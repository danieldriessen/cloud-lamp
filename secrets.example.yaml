# ==============================================================================
#  secrets.example.yaml — Template for secrets.yaml
#
#  Copy this file to secrets.yaml and fill in your own values:
#      cp secrets.example.yaml secrets.yaml
#
#  secrets.yaml is git-ignored and must NEVER be committed.
#  See docs/device-credentials.md for how these credentials are used.
# ==============================================================================

# --- OTA (push updates via `esphome run`) ---
# Required by cloud-lamp.yaml. Any long random string; keep it the same across
# your devices so you can push firmware to all of them.
ota_password: "CHANGE-ME-random-hex-string"

# ------------------------------------------------------------------------------
#  The remaining values are only required by cloud-lamp-dev.yaml
#  (compiled-in Wi-Fi networks).
# ------------------------------------------------------------------------------

# --- Wi-Fi network 1: the network the lamp will normally use ---
wifi_ssid_user:     "MyHomeWiFi"
wifi_password_user: "CHANGE-ME"

# --- Wi-Fi network 2: builder's own Wi-Fi (fallback for development/rescue) ---
wifi_ssid_builder:     "MyWorkshopWiFi"
wifi_password_builder: "CHANGE-ME"

# MQTT broker (ioBroker / Home Assistant / Mosquitto) is no longer a compiled
# secret — every lamp (public and dev) now has MQTT built in, OFF by default,
# with the broker address/port/username/password entered at runtime through
# the web app's Settings → MQTT section and stored on the device itself.
