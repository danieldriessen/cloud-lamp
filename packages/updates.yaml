# ==============================================================================
#  packages/updates.yaml — Online firmware updates (pull, user-triggered)
#
#  How it works:
#    1. The device periodically downloads ${update_manifest_url} over plain
#       HTTP (a small JSON manifest, listing the newest firmware version,
#       download path, MD5 checksum and an Ed25519 signature — see
#       tools/release.sh and components/signed_update/).
#    2. The signature is verified on-device against the ${ota_ed25519_pubkey}
#       baked into the firmware, over "<version>|<path>|<md5>". A manifest
#       that doesn't verify is treated exactly like a failed fetch (no
#       update surfaced) — a plain, unauthenticated HTTP GET can't be trusted
#       on its own, so nothing gets treated as an "update" without this.
#    3. If the (now-trusted) manifest version differs from ${project_version},
#       the web app shows "Update available" with an Install button.
#    4. On install, the firmware is downloaded over plain HTTP, MD5-verified
#       and written to the inactive flash area. The running firmware keeps
#       working during the whole download. Only a fully verified image is
#       booted.
#
#  Safety net (why an update can't brick the lamp):
#    - Download/power failure mid-update  -> old firmware still boots.
#    - Corrupted file                     -> MD5 mismatch, update discarded.
#    - Tampered/unsigned manifest         -> signature check fails, update
#      never surfaces as available in the first place.
#    - New firmware boot-loops            -> safe_mode (cloud-lamp.yaml)
#      catches it after 5 attempts and keeps Wi-Fi + OTA alive for a fix.
#    - Settings live in the preferences area, not the firmware image, and
#      survive every update.
#
#  An unreachable manifest URL is harmless: the check fails silently and the
#  lamp keeps running. Manual browser-upload OTA (web-remote.yaml) always
#  remains available as a fallback.
#
#  Why plain HTTP + a signature, not HTTPS (see docs/firmware-updates.md for
#  the full writeup): the ESP8266's BearSSL TLS stack needs ~16-20 KB of
#  *contiguous* free heap to complete a handshake against GitHub's CDN —
#  confirmed directly on hardware with heap instrumentation, failing with
#  "SSL failure: Unable to allocate buffer memory" even with 12-17 KB free.
#  That's more contiguous headroom than this device reliably has alongside
#  the web server and (when enabled) MQTT. Plain HTTP has no such
#  requirement, but on its own gives an on-path attacker as much trust as
#  today's `verify_ssl: false` HTTPS already did (none) — so the manifest is
#  Ed25519-signed instead, which is strictly stronger authenticity than
#  either, at essentially no memory cost. MQTT is still suspended around
#  checks/installs below as defense-in-depth (a plain HTTP GET is much
#  lighter than a TLS handshake, but every byte of headroom still helps).
# ==============================================================================

http_request:
  # Idle-read timeout between chunks while downloading ~750 KB. Not TLS
  # specific — matters for any slow/stalling connection.
  timeout: 60s
  # ESPHome requires this to be set explicitly on ESP8266 (no cert-verification
  # support there at all) even though nothing here uses https:// any more —
  # both the manifest and the firmware binary are plain HTTP (see the header
  # comment above). Effectively a no-op now; kept because config validation
  # fails without it.
  verify_ssl: false

ota:
  - platform: http_request
    id: ota_via_http

update:
  - platform: signed_update
    id: firmware_update
    name: "Firmware"             # REST object_id: firmware
    source: ${update_manifest_url}
    public_key: ${ota_ed25519_pubkey}
    # Driven by the interval: below instead of update:'s own polling — see
    # the "Automatic check heap guard" comment above it for why.
    update_interval: never

# Automatic check heap guard: update:'s own update_interval polling has no
# on_begin/on_error hooks to extend (unlike ota_via_http above, or the manual
# "Check for updates now" button's on_press list below) — and ESPHome's
# scheduler would otherwise run a PollingComponent's *first* update within a
# few seconds of boot, exactly when MQTT's own connect + discovery burst is
# competing hardest for the ESP8266's tight contiguous heap, *and* often
# before Wi-Fi has even finished associating — so that first check either
# loses the heap race or simply has no network yet, silently fails, and (with
# no on_error retry) leaves the "Update available" badge dark for up to a
# full 6h until the next tick, even though the manifest genuinely has a
# newer version. `startup_delay` pushes the *first* automatic check to 90s
# after boot instead — long past Wi-Fi association/DHCP and MQTT's initial
# connect burst on any network this lamp is likely to be on, but still
# "shortly after boot" from the user's point of view. Confirmed directly
# while diagnosing the original HTTPS install failure: adding three extra
# MQTT-published debug sensors was enough to tip that post-boot window over
# the edge. Kept as defense-in-depth after the move to plain HTTP (see the
# header comment above) — a plain GET is far lighter than the TLS handshake
# that originally motivated this, but it's a cheap guard to keep. Drive the
# periodic check ourselves with the same disable/check/enable order as
# check_for_updates_btn.
interval:
  - interval: 6h
    startup_delay: 90s
    then:
      - lambda: 'mqtt::global_mqtt_client->disable();'
      - update.check: firmware_update
      - lambda: |-
          if (id(mqtt_enabled).state)
            mqtt::global_mqtt_client->enable();

# Web-server REST has install, but not check — expose a button the web app can press.
button:
  - platform: template
    name: "Check for Updates"    # REST object_id: check_for_updates
    id: check_for_updates_btn
    icon: "mdi:cloud-download"
    entity_category: config
    on_press:
      # Same heap-pressure guard as the OTA install (see the "Automatic check
      # heap guard" comment above and packages/mqtt.yaml's ota_via_http
      # on_begin/on_error/on_abort hooks): briefly suspend MQTT's own broker
      # connection so it can't compete with the manifest fetch for heap.
      # Unlike the install hooks this can't live in packages/mqtt.yaml via
      # `!extend` — the disable/re-enable must run strictly before/after
      # update.check in this exact list, and `!extend`-ing a second on_press
      # onto the same button would not guarantee that ordering. Respects
      # the persisted MQTT kill switch — never re-enables MQTT if the user
      # had already turned it off.
      - lambda: 'mqtt::global_mqtt_client->disable();'
      - update.check: firmware_update
      - lambda: |-
          if (id(mqtt_enabled).state)
            mqtt::global_mqtt_client->enable();
