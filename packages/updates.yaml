# ==============================================================================
#  packages/updates.yaml — Online firmware updates (pull, user-triggered)
#
#  How it works:
#    1. The device periodically downloads ${update_manifest_url} (a small
#       JSON manifest in the GitHub repo, served via raw.githubusercontent.com,
#       listing the newest firmware version, download path and MD5 checksum —
#       see tools/release.sh).
#    2. If the manifest version differs from ${project_version}, the web app
#       shows "Update available" with an Install button.
#    3. On install, the firmware is downloaded, MD5-verified and written to
#       the inactive flash area. The running firmware keeps working during
#       the whole download. Only a fully verified image is booted.
#
#  Safety net (why an update can't brick the lamp):
#    - Download/power failure mid-update  -> old firmware still boots.
#    - Corrupted file                     -> MD5 mismatch, update discarded.
#    - New firmware boot-loops            -> safe_mode (cloud-lamp.yaml)
#      catches it after 5 attempts and keeps Wi-Fi + OTA alive for a fix.
#    - Settings live in the preferences area, not the firmware image, and
#      survive every update.
#
#  An unreachable manifest URL is harmless: the check fails silently and the
#  lamp keeps running. Manual browser-upload OTA (web-remote.yaml) always
#  remains available as a fallback.
#
#  Reliability note (RAM, not the binary): the ESP8266 has ~40 KB free heap
#  in normal operation, and BearSSL needs an ~8.7 KB *contiguous* buffer for
#  the OTA's own HTTPS session (see tls_buffer_size_rx/tx below) — on top of
#  whatever else is holding a socket open at the time. A held-open web-app
#  SSE connection and (when "MQTT Enabled" is on) the MQTT client's own
#  broker connection are the two biggest avoidable competitors for that
#  budget, and both were observed causing "update failed, previous firmware
#  still running" on real hardware (the safety net worked correctly — the
#  underlying cause was resource pressure, not a bad binary; committed
#  binaries were verified byte-for-byte against their manifest MD5).
#  Mitigations: web/app.html closes its EventSource before POSTing install
#  and only reconnects once the update coach reaches done/fail; MQTT is
#  suspended for the OTA's duration (regardless of the kill switch's state)
#  via the ota_via_http entity's on_begin/on_error/on_abort hooks in
#  packages/mqtt.yaml.
# ==============================================================================

http_request:
  # Idle-read timeout between chunks while downloading ~750 KB over HTTPS.
  # 15 s was too tight when GitHub/Fastly stalled briefly — the OTA aborted,
  # the update entity snapped back to "UPDATE AVAILABLE", and the web app
  # looked like "nothing happened" (no error is exposed on the REST API).
  timeout: 60s
  # BearSSL on the ESP8266 has no CA certificate store; transport is still
  # TLS-encrypted, and firmware integrity is enforced by the manifest MD5.
  verify_ssl: false
  # GitHub / Fastly send full-size TLS records. The ESP8266 default (512)
  # fails with BR_ERR_TOO_LARGE. ESPHome docs recommend 16384; that OOM's on
  # the MQTT-enabled dev build, so we use 8192 as a practical middle ground
  # that fits gift + bench lamps. If checks fail with BR_ERR_TOO_LARGE again,
  # raise toward 16384 on gift builds (no MQTT) or host via a CDN with MFL.
  tls_buffer_size_rx: 8192
  tls_buffer_size_tx: 512

ota:
  - platform: http_request
    id: ota_via_http

update:
  - platform: http_request
    id: firmware_update
    name: "Firmware"             # REST object_id: firmware
    source: ${update_manifest_url}
    update_interval: 6h

# Web-server REST has install, but not check — expose a button the web app can press.
button:
  - platform: template
    name: "Check for Updates"    # REST object_id: check_for_updates
    id: check_for_updates_btn
    icon: "mdi:cloud-download"
    entity_category: config
    on_press:
      - update.check: firmware_update
