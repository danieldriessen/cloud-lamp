# ==============================================================================
#  packages/mqtt.yaml — Optional MQTT / ioBroker integration
#
#  Always compiled in (public gift build AND dev build) but OFF by default
#  and completely runtime-configurable — no broker credentials are ever
#  baked into a binary:
#    - "MQTT Enabled" switch — OFF on every new device (RESTORE_DEFAULT_OFF)
#    - "MQTT Broker" / "MQTT Port" / "MQTT Username" / "MQTT Password" —
#      text/number entities in the web app's settings sheet, only shown
#      while MQTT is enabled, persisted to flash, applied live via
#      MQTTClientComponent::set_broker_address()/set_broker_port()/
#      set_username()/set_password() (no reflash needed to (re)configure)
#    - reboot_timeout: 0s — an unreachable broker never reboots the lamp
#    - all handlers drive the same light/scripts as the button and web app
#
#  Topic scheme (unchanged from v1): ${mqtt_topic_root}${mqtt_topic_device}/
#    Set/…      ioBroker → device   (commands,   retain: false)
#    State/…    device → ioBroker   (state,      retain: true)
#    Info/…     device → ioBroker   (metadata,   retain: true/false)
#    Logging/…  device → ioBroker   (boot info,  retain: true; log lines QoS 0)
#
#  v2 fixes over v1:
#    - Logging/Last_Reboot is published from time.on_time_sync (v1 published
#      3 s after boot, when SNTP was almost never synced and MQTT often not
#      connected — the timestamp was silently lost).
#    - Logging/Last_Reboot_Reason is published on the first MQTT connect
#      (v1: on_boot, same lost-publish problem).
#    - Set/Reboot is protected against a stuck retained "true": commands
#      arriving within 15 s of (re)connect are ignored, and the topic is
#      cleared on the broker after every reception.
# ==============================================================================

globals:
  - id: mqtt_connected_at
    type: unsigned long
    restore_value: no
    initial_value: '0'

  - id: reboot_reason_published
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: last_reboot_published
    type: bool
    restore_value: no
    initial_value: 'false'

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    on_time_sync:
      # Publish the boot timestamp exactly once, as soon as both SNTP and
      # MQTT are actually able to deliver it.
      - lambda: |-
          if (id(last_reboot_published) || !mqtt::global_mqtt_client->is_connected())
            return;
          char buf[25];
          id(sntp_time).now().strftime(buf, sizeof(buf), "%Y-%m-%d %H:%M:%S");
          mqtt::global_mqtt_client->publish(
              "${mqtt_topic_root}${mqtt_topic_device}/Logging/Last_Reboot",
              std::string(buf), 1, true);
          id(last_reboot_published) = true;

mqtt:
  # Broker/port/username/password below are just placeholders to satisfy
  # ESPHome's schema (broker: is required) — the real values always come
  # from the text/number entities further down, restored from flash and
  # pushed in via the setters whenever "MQTT Enabled" turns on or a field
  # changes while already on. enable_on_boot: false means the client never
  # even tries to connect until that switch (default OFF) says so.
  broker: ""
  port: 1883
  enable_on_boot: false
  clean_session: false   # Broker queues QoS 1 messages while device is offline
  keepalive: 8s
  # NEVER reboot the lamp because the broker is unreachable. A gift lamp in a
  # home without a broker must behave exactly like a lamp without MQTT.
  reboot_timeout: 0s

  log_topic:
    topic: "${mqtt_topic_root}${mqtt_topic_device}/Logging/Log"
    qos: 0
    retain: false

  birth_message:
    topic: "${mqtt_topic_root}${mqtt_topic_device}/Info/Reachable"
    payload: "online"
    qos: 1
    retain: true

  will_message:
    topic: "${mqtt_topic_root}${mqtt_topic_device}/Info/Reachable"
    payload: "offline"
    qos: 1
    retain: true

  on_connect:
    then:
      - lambda: 'id(mqtt_connected_at) = millis();'
      - script.execute: publish_full_state
      - mqtt.publish:
          topic: "${mqtt_topic_root}${mqtt_topic_device}/Info/IP"
          payload: !lambda 'return WiFi.localIP().toString().c_str();'
          retain: true
          qos: 1
      - lambda: |-
          if (!id(reboot_reason_published)) {
            mqtt::global_mqtt_client->publish(
                "${mqtt_topic_root}${mqtt_topic_device}/Logging/Last_Reboot_Reason",
                std::string(ESP.getResetReason().c_str()), 1, true);
            id(reboot_reason_published) = true;
          }
          // Retry the Last_Reboot timestamp in case SNTP synced while MQTT was down.
          if (!id(last_reboot_published) && id(sntp_time).now().is_valid()) {
            char buf[25];
            id(sntp_time).now().strftime(buf, sizeof(buf), "%Y-%m-%d %H:%M:%S");
            mqtt::global_mqtt_client->publish(
                "${mqtt_topic_root}${mqtt_topic_device}/Logging/Last_Reboot",
                std::string(buf), 1, true);
            id(last_reboot_published) = true;
          }

  on_message:
    - topic: "${mqtt_topic_root}${mqtt_topic_device}/Set/On"
      qos: 1
      then:
        - lambda: |-
            if (!id(boot_completed)) {
              ESP_LOGW("lamp", "MQTT Set/On: ignoring during boot");
              return;
            }
            if (x == "true" || x == "True" || x == "TRUE" ||
                x == "on"   || x == "On"   || x == "ON"   || x == "1") {
              ESP_LOGI("lamp", "MQTT Set/On: ON (last effect)");
              id(lamp_turn_on).execute();
            } else {
              ESP_LOGI("lamp", "MQTT Set/On: OFF");
              id(lamp_turn_off).execute();
            }
            id(publish_full_state).execute();

    - topic: "${mqtt_topic_root}${mqtt_topic_device}/Set/Effect"
      qos: 1
      then:
        - lambda: |-
            if (!id(boot_completed)) {
              ESP_LOGW("lamp", "MQTT Set/Effect: ignoring during boot");
              return;
            }
            const auto &effects = id(led_rings).get_effects();
            for (size_t i = 0; i < effects.size(); i++) {
              if (strcmp(effects[i]->get_name().c_str(), x.c_str()) == 0) {
                id(last_effect_index) = (int) i;
                id(custom_color_active) = false;  // explicit effect beats custom colour
                ESP_LOGI("lamp", "MQTT Set/Effect: \"%s\" (turns on if off)", x.c_str());
                id(lamp_turn_on).execute();
                id(publish_full_state).execute();
                return;
              }
            }
            ESP_LOGW("lamp", "MQTT Set/Effect: unknown effect \"%s\" — ignoring (case-sensitive)", x.c_str());
            id(publish_full_state).execute();

    - topic: "${mqtt_topic_root}${mqtt_topic_device}/Set/Brightness"
      qos: 1
      then:
        - lambda: |-
            if (!id(boot_completed)) {
              ESP_LOGW("lamp", "MQTT Set/Brightness: ignoring during boot");
              return;
            }
            int val = atoi(x.c_str());
            if (val <= 0 || val > 100) {
              ESP_LOGW("lamp", "MQTT Set/Brightness: %d out of range (1-100) — ignoring", val);
              id(publish_full_state).execute();
              return;
            }
            if (val < ${brightness_min}) {
              // Below the visible floor: clamp instead of turning the lamp
              // near-dark — off is only ever an explicit Set/On false.
              ESP_LOGW("lamp", "MQTT Set/Brightness: %d%% below minimum — clamping to ${brightness_min}%%", val);
              val = ${brightness_min};
            }
            id(brightness_pct) = val;
            ESP_LOGI("lamp", "MQTT Set/Brightness: %d%%", val);
            if (id(led_rings).remote_values.is_on()) {
              auto call = id(led_rings).turn_on();
              call.set_brightness(val / 100.0f);
              call.perform();
            }
            id(publish_full_state).execute();

    - topic: "${mqtt_topic_root}${mqtt_topic_device}/Set/Reboot"
      qos: 1
      payload: "true"
      then:
        - lambda: |-
            // Clear any retained copy on the broker so a reboot command can
            // never replay on reconnect (a retained "true" would otherwise
            // cause an endless reboot loop).
            mqtt::global_mqtt_client->publish(
                "${mqtt_topic_root}${mqtt_topic_device}/Set/Reboot", std::string(""), 1, true);
        - if:
            condition:
              lambda: |-
                return id(boot_completed) &&
                       (millis() - id(mqtt_connected_at)) > 15000;
            then:
              - logger.log:
                  level: WARN
                  format: "MQTT Set/Reboot: rebooting in 3 s"
              - delay: 3s
              - button.press: restart_btn
            else:
              - logger.log:
                  level: WARN
                  format: "MQTT Set/Reboot: ignored (boot/connect grace period)"

# ================================================================
#  Periodic state re-publishing (self-healing sync with ioBroker)
# ================================================================
interval:
  - interval: 10s
    then:
      - if:
          condition:
            mqtt.connected:
          then:
            - script.execute: publish_full_state

  - interval: 60s
    then:
      - if:
          condition:
            mqtt.connected:
          then:
            - mqtt.publish:
                topic: "${mqtt_topic_root}${mqtt_topic_device}/Info/IP"
                payload: !lambda 'return WiFi.localIP().toString().c_str();'
                retain: true
                qos: 1
            - mqtt.publish:
                topic: "${mqtt_topic_root}${mqtt_topic_device}/Info/Uptime"
                payload: !lambda 'return to_string((unsigned long)(millis() / 1000));'
                retain: false
                qos: 1
            - mqtt.publish:
                topic: "${mqtt_topic_root}${mqtt_topic_device}/Info/WiFi_Signal"
                payload: !lambda 'return to_string(WiFi.RSSI());'
                retain: false
                qos: 1

script:
  - id: publish_full_state
    mode: single
    then:
      - if:
          condition:
            mqtt.connected:
          then:
            - mqtt.publish:
                topic: "${mqtt_topic_root}${mqtt_topic_device}/State/On"
                payload: !lambda 'return id(led_rings).remote_values.is_on() ? "true" : "false";'
                retain: true
                qos: 1
            - mqtt.publish:
                topic: "${mqtt_topic_root}${mqtt_topic_device}/State/Effect"
                payload: !lambda |-
                  if (id(custom_color_active))
                    return std::string("Custom Color");
                  const auto &effects = id(led_rings).get_effects();
                  int idx = id(last_effect_index);
                  if (idx < 0 || idx >= (int) effects.size())
                    return std::string("None");
                  return std::string(effects[idx]->get_name().c_str());
                retain: true
                qos: 1
            - mqtt.publish:
                topic: "${mqtt_topic_root}${mqtt_topic_device}/State/Brightness"
                payload: !lambda 'return to_string(id(brightness_pct));'
                retain: true
                qos: 1

# ================================================================
#  Free heap for the OTA update — MQTT keeps a live broker connection
#  (its own TCP socket + buffers) that competes with the OTA's own HTTPS
#  download for the ESP8266's ~40 KB of free heap, right when BearSSL needs
#  an ~8.7 KB *contiguous* buffer for the download's TLS session. Suspend
#  MQTT for the duration (transient — does not touch the persisted
#  "MQTT Enabled" switch state) and resume it if the update aborts; a
#  successful update reboots into new firmware, which restores MQTT itself.
# ================================================================
ota:
  - id: !extend ota_via_http
    on_begin:
      - lambda: 'mqtt::global_mqtt_client->disable();'
    on_error:
      # Only resume if the user hasn't explicitly turned MQTT off via the
      # kill switch — this is a transient pause, not a state change.
      - lambda: |-
          if (id(mqtt_enabled).state)
            mqtt::global_mqtt_client->enable();
    on_abort:
      - lambda: |-
          if (id(mqtt_enabled).state)
            mqtt::global_mqtt_client->enable();

# ================================================================
#  Runtime on/off switch — visible in the web app's settings sheet.
#  OFF by default on every new device (RESTORE_DEFAULT_OFF); the user opts
#  in from the web UI. Persisted, so the choice survives reboots.
# ================================================================
switch:
  - platform: template
    name: "MQTT Enabled"          # REST object_id: mqtt_enabled
    id: mqtt_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    turn_on_action:
      # (Re-)apply the current broker settings before connecting — covers
      # both a manual toggle and the switch restoring ON at boot, when the
      # static `mqtt:` block above only ever has the empty placeholders.
      - lambda: |-
          mqtt::global_mqtt_client->set_broker_address(id(mqtt_broker_host).state);
          mqtt::global_mqtt_client->set_broker_port((uint16_t) id(mqtt_broker_port).state);
          mqtt::global_mqtt_client->set_username(id(mqtt_broker_username).state);
          mqtt::global_mqtt_client->set_password(id(mqtt_broker_password).state);
          mqtt::global_mqtt_client->enable();
    turn_off_action:
      - lambda: 'mqtt::global_mqtt_client->disable();'

# ================================================================
#  Broker connection settings — visible in the web app only while
#  "MQTT Enabled" is on; persisted regardless, so turning MQTT off never
#  loses what the user typed in. Editing a field while MQTT is already on
#  reconnects immediately with the new value (no toggle cycle needed).
# ================================================================
text:
  - platform: template
    name: "MQTT Broker"           # REST object_id: mqtt_broker_host
    id: mqtt_broker_host
    mode: text
    optimistic: true
    restore_value: true
    max_length: 64
    entity_category: config
    set_action:
      - lambda: |-
          if (id(mqtt_enabled).state) {
            mqtt::global_mqtt_client->disable();
            mqtt::global_mqtt_client->set_broker_address(x);
            mqtt::global_mqtt_client->enable();
          }

  - platform: template
    name: "MQTT Username"         # REST object_id: mqtt_broker_username
    id: mqtt_broker_username
    mode: text
    optimistic: true
    restore_value: true
    max_length: 32
    entity_category: config
    set_action:
      - lambda: |-
          if (id(mqtt_enabled).state) {
            mqtt::global_mqtt_client->disable();
            mqtt::global_mqtt_client->set_username(x);
            mqtt::global_mqtt_client->enable();
          }

  - platform: template
    name: "MQTT Password"         # REST object_id: mqtt_broker_password
    id: mqtt_broker_password
    mode: password
    optimistic: true
    restore_value: true
    max_length: 64
    entity_category: config
    set_action:
      - lambda: |-
          if (id(mqtt_enabled).state) {
            mqtt::global_mqtt_client->disable();
            mqtt::global_mqtt_client->set_password(x);
            mqtt::global_mqtt_client->enable();
          }

number:
  - platform: template
    name: "MQTT Port"             # REST object_id: mqtt_broker_port
    id: mqtt_broker_port
    min_value: 1
    max_value: 65535
    step: 1
    initial_value: 1883
    optimistic: true
    restore_value: true
    entity_category: config
    mode: box
    set_action:
      - lambda: |-
          if (id(mqtt_enabled).state) {
            mqtt::global_mqtt_client->disable();
            mqtt::global_mqtt_client->set_broker_port((uint16_t) x);
            mqtt::global_mqtt_client->enable();
          }
